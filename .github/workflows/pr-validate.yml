name: Validate join request
on:
  pull_request:
    branches: [main]

# Fork PRs get a read-only token; this repo has no secrets to protect.
# We only ever *parse* PR content with jq — never execute anything from it.
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: join request shape
        run: |
          base="origin/${GITHUB_BASE_REF}"
          git fetch -q origin "${GITHUB_BASE_REF}"
          mapfile -t changed < <(git diff --name-only --diff-filter=ACMDR "$base"...HEAD)
          echo "changed files: ${changed[*]}"

          # Docs/script PRs (from yerry) are exempt from join-request shape rules
          if ! printf '%s\n' "${changed[@]}" | grep -q '^pending-peers/'; then
            echo "not a join request — skipping shape validation"
            exit 0
          fi

          [ "${#changed[@]}" -eq 1 ] || { echo "::error::join request must change exactly one file"; exit 1; }
          f="${changed[0]}"
          [[ "$f" =~ ^pending-peers/[a-z0-9][a-z0-9-]{1,30}\.json$ ]] || { echo "::error::bad filename: $f"; exit 1; }

          jq -e . "$f" >/dev/null || { echo "::error::not valid JSON"; exit 1; }
          name="$(jq -r .name "$f")"
          ip="$(jq -r .wg_ip "$f")"
          pub="$(jq -r .wg_pubkey "$f")"
          age="$(jq -r .age_recipient "$f")"
          ep="$(jq -r .endpoint_type "$f")"

          [ "pending-peers/$name.json" = "$f" ] || { echo "::error::name/filename mismatch"; exit 1; }
          [[ "$ip" =~ ^10\.44\.0\.([2-9]|[1-9][0-9]|1[0-9][0-9]|2[0-4][0-9]|25[0-4])$ ]] || { echo "::error::bad wg_ip"; exit 1; }
          [[ "$pub" =~ ^[A-Za-z0-9+/]{43}=$ ]] || { echo "::error::bad wg_pubkey"; exit 1; }
          [[ "$age" =~ ^age1[a-z0-9]+$ ]] || { echo "::error::bad age_recipient"; exit 1; }
          [[ "$ep" =~ ^(lan|ddns)$ ]] || { echo "::error::bad endpoint_type"; exit 1; }

          # IP / pubkey must be free on main
          git show "$base:devices.json" > /tmp/devices.json
          if jq -e --arg ip "$ip" --arg pub "$pub" \
               '.devices[] | select(.wg_ip == $ip or .wg_pubkey == $pub)' /tmp/devices.json >/dev/null; then
            echo "::error::wg_ip or wg_pubkey already registered in devices.json"
            exit 1
          fi
          echo "join request for '$name' ($ip) looks valid — yerry: ./approve.sh $name"
